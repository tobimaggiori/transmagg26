name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 62.169.24.54
          username: tobi
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/transmagg26
            git pull origin main
            npm install
            npx prisma migrate deploy
            pm2 restart transmagg
